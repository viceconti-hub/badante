<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatore costi badante</title>
<style>
body{font-family:Arial;margin:16px;background:#f7f7f9}
.wrap{max-width:900px;margin:auto}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
input{width:100%;padding:8px;border-radius:8px;border:1px solid #ccc}
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
.result-box{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px}
.value{font-weight:bold;font-size:1.2rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}

/* FIX MOBILE */
th:first-child, td:first-child{
  width:70px;
  max-width:70px;
  word-break:break-word;
}
th{
  background:#f1f3f5;
  font-size:12px;
}
@media(max-width:600px){
  table{font-size:11px}
  th,td{padding:6px}
}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h2>Parametri</h2>
<div class="grid">
<div><label>€/h</label><input id="tariffa" value="7"></div>
<div><label>Ore</label><input id="ore" value="3"></div>
<div><label>Giorni</label><input id="giorni" value="1"></div>
</div>

<div class="results">
<div class="result-box">Visita<div class="value" id="visita"></div></div>
<div class="result-box">Sett<div class="value" id="sett"></div></div>
<div class="result-box">Mese<div class="value" id="mese"></div></div>
<div class="result-box">Anno<div class="value" id="anno"></div></div>
</div>
</div>

<div class="card">
<h2>Scenari</h2>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Giorni/<br>sett</th>
<th>Ore</th>
<th>Sett</th>
<th>Mese</th>
<th>Anno</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

</div>

<script>
function euro(v){return v.toFixed(2).replace('.',',')+" €"}

function calc(){
let t=+tariffa.value||0
let o=+ore.value||0
let g=+giorni.value||0

let visita=t*o
let sett=t*o*g
let mese=sett*4.33
let anno=sett*52

visitaEl.textContent=euro(visita)
settEl.textContent=euro(sett)
meseEl.textContent=euro(mese)
annoEl.textContent=euro(anno)

body.innerHTML=""
for(let i=1;i<=7;i++){
let s=t*o*i
body.innerHTML+=`<tr>
<td>${i}</td>
<td>${(o*i).toFixed(1)}</td>
<td>${euro(s)}</td>
<td>${euro(s*4.33)}</td>
<td>${euro(s*52)}</td>
</tr>`
}
}

const tariffa=document.getElementById('tariffa')
const ore=document.getElementById('ore')
const giorni=document.getElementById('giorni')

const visitaEl=document.getElementById('visita')
const settEl=document.getElementById('sett')
const meseEl=document.getElementById('mese')
const annoEl=document.getElementById('anno')
const body=document.getElementById('body')

document.querySelectorAll('input').forEach(i=>i.oninput=calc)
calc()
</script>

</body>
</html>
